name: Build and Deploy to GCP

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GKE_CLUSTER: planepool-cluster
  GKE_ZONE: us-central1-a
  IMAGE_NAME: planepool-admin
  REGISTRY_HOSTNAME: gcr.io

jobs:
  setup-build-deploy:
    name: Setup, Build, and Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '22'
        cache: 'pnpm'

    - name: Install pnpm
      run: npm install -g pnpm

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Run linting
      run: pnpm format --check

    - name: Run tests
      run: pnpm test

    - name: Build application
      run: pnpm build

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v1
      with:
        workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
        service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v1

    - name: Configure Docker to use gcloud as credential helper
      run: |
        gcloud auth configure-docker ${{ env.REGISTRY_HOSTNAME }}

    - name: Build Docker image
      run: |
        docker build -t "${{ env.REGISTRY_HOSTNAME }}/${{ env.PROJECT_ID }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" \
                     -t "${{ env.REGISTRY_HOSTNAME }}/${{ env.PROJECT_ID }}/${{ env.IMAGE_NAME }}:latest" .

    - name: Push Docker image
      run: |
        docker push "${{ env.REGISTRY_HOSTNAME }}/${{ env.PROJECT_ID }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
        docker push "${{ env.REGISTRY_HOSTNAME }}/${{ env.PROJECT_ID }}/${{ env.IMAGE_NAME }}:latest"

    - name: Get GKE credentials
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        gcloud container clusters get-credentials "${{ env.GKE_CLUSTER }}" --zone "${{ env.GKE_ZONE }}"

    - name: Deploy to GKE
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        kubectl set image deployment/planepool-admin \
          planepool-admin=${{ env.REGISTRY_HOSTNAME }}/${{ env.PROJECT_ID }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
          -n planepool
        kubectl rollout status deployment/planepool-admin -n planepool --timeout=5m

    - name: Run smoke tests
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        kubectl run smoke-test --image=curlimages/curl:latest --rm -i --restart=Never \
          -- curl -f http://planepool-admin.planepool.svc.cluster.local/health || exit 1

    - name: Notify deployment
      if: always()
      uses: actions/github-script@v6
      with:
        script: |
          const status = context.job.status === 'success' ? '✅' : '❌';
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `${status} Deployment ${context.job.status}`
          });
