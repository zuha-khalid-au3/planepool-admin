apiVersion: v1
kind: Namespace
metadata:
  name: planepool

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: planepool-admin
  namespace: planepool
  labels:
    app: planepool-admin
    version: v1
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: planepool-admin
  template:
    metadata:
      labels:
        app: planepool-admin
        version: v1
    spec:
      serviceAccountName: planepool-admin
      containers:
      - name: planepool-admin
        image: gcr.io/PROJECT_ID/planepool-admin:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
          protocol: TCP
        env:
        - name: NODE_ENV
          value: "production"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: planepool-secrets
              key: database-url
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: planepool-secrets
              key: jwt-secret
        - name: OAUTH_SERVER_URL
          valueFrom:
            secretKeyRef:
              name: planepool-secrets
              key: oauth-server-url
        - name: VITE_APP_ID
          valueFrom:
            secretKeyRef:
              name: planepool-secrets
              key: vite-app-id
        - name: VITE_OAUTH_PORTAL_URL
          valueFrom:
            secretKeyRef:
              name: planepool-secrets
              key: vite-oauth-portal-url
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: planepool-admin
  namespace: planepool
  labels:
    app: planepool-admin
spec:
  type: LoadBalancer
  selector:
    app: planepool-admin
  ports:
  - name: http
    port: 80
    targetPort: 3000
    protocol: TCP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: planepool-admin-hpa
  namespace: planepool
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: planepool-admin
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: planepool-admin
  namespace: planepool

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: planepool-admin-network-policy
  namespace: planepool
spec:
  podSelector:
    matchLabels:
      app: planepool-admin
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 3000
  egress:
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 3306
